[project]
name = "agent_patterns"
version = "1.0.0"
description = "A modular, production-ready AI agent pattern engine."
authors = [
    { name = "AgenticOS Team" }
]
dependencies = [
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
    "mypy"
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"
